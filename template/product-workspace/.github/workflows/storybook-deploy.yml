# Storybook deploy pipeline(2026-05-23 ship per user「應該部署到netlify並要有權限控管」)
#
# Host:**Netlify**(同 deploy.yml — 統一 host,private workspace 不該用 public GitHub Pages)
#
# **權限控管 setup**(Netlify dashboard,site 建好後設一次):
#   Recommended for storybook:Netlify Identity + invite-only
#     - Free tier
#     - Team member email 邀請,non-team click 看不到 storybook
#     - 同個 SSO if team org 已有 SAML
#   Alternative:Site Password(Pro $19/mo)
#     - 全 team 共一密碼,簡單但低 audit
#
# Pre-requisite GitHub secrets:
#   NETLIFY_AUTH_TOKEN          — global PAT
#   NETLIFY_SITE_ID_STORYBOOK   — storybook 專用 site ID
name: Storybook Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_STORYBOOK: ${{ secrets.NETLIFY_SITE_ID_STORYBOOK }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID_STORYBOOK" ]; then
            echo "Netlify storybook secrets not set,skip"
            exit 0
          fi

          PROD_FLAG=""
          if [ "${{ github.event_name }}" = "push" ]; then PROD_FLAG="--prod"; fi

          npx netlify-cli deploy \
            --dir storybook-static \
            --site $NETLIFY_SITE_ID_STORYBOOK \
            --auth $NETLIFY_AUTH_TOKEN \
            --message "Storybook deploy from $GITHUB_SHA" \
            $PROD_FLAG

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 Storybook deploy preview: see Netlify deploy log above for branch-deploy URL'
            })
