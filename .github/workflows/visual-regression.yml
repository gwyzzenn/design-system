name: Visual Regression

# Phase 5.2 2026-05-25 — DS-wide visual regression CI
#
# Pixel diff every story screenshot vs committed snapshots-baseline/.
# Fail = block merge(防止視覺 drift ship 進 main)。
#
# 對齊 Chromatic / Percy / BackstopJS 的 self-hosted visual diff infra
# (我們用 playwright + pixelmatch 自己跑,免 SaaS 訂閱)。
#
# Updating baseline(2026-06-16 修正 — 舊「Local --update-baseline」會造成跨 OS 像素差,見 commit db4906ba):
#   ⚠️ baseline 必須是 CI ubuntu 渲染。macOS 本機 render 跟 ubuntu 字型渲染不同 → 直接 local
#   `--update-baseline` 會灌進 macOS 字型 → ~31 張假 diff(db4906ba 就是在修這個)。正確流程:
#   1. 改 component 視覺(intentional change)後,在該分支跑本 workflow(push main / PR / 或 workflow_dispatch)
#   2. CI 在 ubuntu 渲染 + diff,fail 時上傳 `visual-regression-diffs` artifact(含 ubuntu 渲染的 snapshots/)
#   3. `gh run download <run> -n visual-regression-diffs -D /tmp/vr` → 人工核對 breached 圖內容 = 有意變更
#   4. 把 breached 那幾張 ubuntu PNG 覆蓋進 snapshots-baseline/ → commit + push
#   5. 重跑本 workflow → 0 diff pass
#
# Skip mechanism: PR title 含「[skip-visual]」可暫繞(emergency only,需 audit reason 進 commit msg)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 2026-06-16:手動觸發 — 在工作分支上跑 ubuntu render 以更新 baseline(免 PR / 免先 ship)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# 2026-06-04 SSOT 假綠根治:bash -eo pipefail → `| tail` 不再吞 exit code。
defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  visual-regression:
    name: Visual Regression Diff(DS-wide pixel match)
    if: "!contains(github.event.head_commit.message, '[skip-visual]') && !contains(github.event.pull_request.title, '[skip-visual]')"
    runs-on: ubuntu-latest
    timeout-minutes: 45  # ~1000 stories × screenshot + diff ≈ 20-30 min

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # snapshots-baseline/ 可能未來改 LFS — 提前 enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # 2026-06-04 fix(missing-build-dep):build-storybook 的 prebuild 跑 storybook-config tsc,需 DS dist 型別。
      # 漏此步在 a11y workflow 已造成 build 早夭;此 workflow 一併補上對齊 ci.yml / release.yml。
      - name: Build DS lib + types
        run: npm run build:lib 2>&1 | tail -10

      - name: Build Storybook
        run: npm run build-storybook 2>&1 | tail -5

      - name: Visual regression diff(scope=all)
        run: |
          # Auto-start storybook static server inside visual-audit.mjs
          npm run visual-audit -- --scope=all 2>&1 | tail -40

      - name: Upload diff artifacts(on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            snapshots/
            snapshots/report.json
          if-no-files-found: warn
          retention-days: 14
